<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — TaskFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">

    <!-- Left panel -->
    <div class="auth-left">
        <svg class="bg-art" viewBox="0 0 500 700" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="80"  cy="120" r="180" fill="white"/>
            <circle cx="420" cy="500" r="220" fill="white"/>
            <rect x="60"  y="300" width="120" height="120" rx="24" fill="white" transform="rotate(20 60 300)"/>
            <rect x="300" y="80"  width="80"  height="80"  rx="16" fill="white" transform="rotate(-15 300 80)"/>
            <line x1="0" y1="350" x2="500" y2="350" stroke="white" stroke-width="1"/>
            <line x1="250" y1="0" x2="250" y2="700" stroke="white" stroke-width="1"/>
        </svg>
        <div class="auth-brand">
            <div class="mark">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <path d="M6 14L11 19L22 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>TaskFlow</h1>
            <p>A clean, focused space to manage your tasks and stay on top of your day.</p>
        </div>
    </div>

    <!-- Right panel -->
    <div class="auth-right">
        <div class="auth-form-box">
            <h2>Welcome back</h2>
            <p class="sub">Sign in to your account to continue</p>
            {% with messages = get_flashed_messages() %}
                {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
            {% endwith %}
            <form method="POST">
                <div class="field">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-main">Sign in</button>
            </form>
            <div class="auth-switch">
                No account yet? <a href="/register">Create one</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
